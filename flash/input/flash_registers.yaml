- name: FMDBG
  address: '0x208C'
  default: '0x0000_0000'
  fields:
  - bit_range: '4'
    name: DBG_LOCK
    access: RW
    description: TESTBUS_SEL Debug controller register lock
  - bit_range: '3:0'
    name: TESTBUS_SEL
    access: RW
    description: '4''b0000: testbus = 16''h0. 4''b0001: pflash test signal. 4''b0010:
      dflash test signal. default: testbus = 16''h0'
- name: FMSPCLK
  address: '0x2090'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: FMSPCLCK
    access: RW
    description: "Flash special lock. Before write this register, correct unlock sequence\
      \ should be write into FMUKR. write sequence : write sequence : 32'h0123_4567\
      \ -> 32'heedd_ccbb will unlock PF_SMWSETTING_CFG/PF_SMWSETTING3_CFG/DF_SMWSETTING_CFG/DF_SMWSETTING3_CFG\
      \ register;\n write sequence : write sequence : 32'h1234_7805 -> 32'hddcc_bbaa\
      \ will unlock PF_SMPWHV0/PF_SMPWHV1/PF_SMEWHV0/PF_SMEWHV1 register\n write sequence\
      \ : write sequence : 32'h6789_7805 -> 32'h1122_3344 will unlock DF_SMPWHV0/DF_SMPWHV1/DF_SMEWHV0/DF_SMEWHV1\
      \ register\n write sequence : 32'h3322 1100 -> 32'hffee ddcc will enable reference\
      \ cell erase command"
