  fields:
  - bit_range: '31:0'
    name: response
    access: RW
    description: '32''b00000000: used to input the mac value for CMAC verification
- name: MAC3
  address: '0x78'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: response
    access: RW
    description: '32''b00000000: used to input the mac value for CMAC verification
- name: STAT
  address: '0x7C'
  default: '0x0000_0000'
  fields:
  - bit_range: '16'
    name: clear
    access: WO
    description: 'write to 1 to clear global STAT register(reset to 0x0000_0000)'
  - bit_range: '10'
    name: err10
    access: RO
    description: '1''b1: if we set the length to zero when request random get service, than this bit will be set in HSM'
  - bit_range: '9'
    name: err9
    access: RO
    description: '1''b1: if we set the length not align with 4bytes when request random get service, than this bit will be set in HSM'
  - bit_range: '8'
    name: err8
    access: RO
    description: '1''b1: if the key specified by the input keyindex is not used for authentication when request authentication service,
        than this bit will be set in HSM'
  - bit_range: '7'
    name: err7
    access: RO
    description: '1''b1: if the input keyindex > 18 when request CMAC service, than this bit will be set in HSM'
  - bit_range: '6'
    name: err6
    access: RO
    description: '1''b1: if the key specified by the input keyindex is not used for CMAC when request CMAC service,
        than this bit will be set in HSM'
  - bit_range: '5'
    name: err5
    access: RO
    description: '1''b1: if the input keyindex > 18 when request ECB or CBC service, than this bit will be set in HSM'
  - bit_range: '4'
    name: err4
    access: RO
    description: '1''b1: if the key specified by the input keyindex is used for authentication when request ECB or CBC service,
        than this bit will be set in HSM'
  - bit_range: '3'
    name: err3
    access: RO
    description: '1''b1: if the key specified by the input keyindex is used for CMAC when request ECB or CBC service,
        than this bit will be set in HSM'
  - bit_range: '2'
    name: err2
    access: RO
    description: '1''b1: if the input length is set to 0 when request ECB or CBC service, than this bit will be set in HSM'
  - bit_range: '1'
    name: err1
    access: RO
    description: '1''b1: if the input length is not align to 16bytes when request ECB or CBC service, than this bit will be set in HSM'
  - bit_range: '0'
    name: err0
    access: RO
    description: '1''b1: Reserved'