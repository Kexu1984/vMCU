registers:
- name: UID0
  address: '0x000'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: UID0
    access: RO
    description: UID[127:96], value read from OTP, can't be changed
- name: UID1
  address: '0x004'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: UID1
    access: RO
    description: UID[95:64], value read from OTP, can't be changed
- name: UID2
  address: '0x008'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: UID2
    access: RO
    description: UID[63:32], value read from OTP, can't be changed
- name: UID3
  address: '0x00C'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: UID3
    access: RO
    description: UID[31:0], value read from OTP, can't be changed
- name: CMD
  address: '0x010'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:28'
    name: cipher mode
    access: RW
    description: '4''b0000: ecb mode

      4''b0001: cbc mode

      4''b0010: cfb8 mode

      4''b0011: cfb128 mode

      4''b0100: ofb mode

      4''b0101: ctr mode

      4''b0110: cmac mode

      4''b0111: authentication mode

      4''b1xxx: get random number mode'
  - bit_range: '27'
    name: decrypt_en
    access: RW
    description: '1: decrypt, 0: encrypt, only valid in ecb mode and cbc mode'
  - bit_range: '26:22'
    name: key_idx
    access: RW
    description: Key index, valid from 0~22
  - bit_range: '20'
    name: aes256_en
    access: RW
    description: '1''b1: enable aes-256'
  - bit_range: '19:0'
    name: txt_len
    access: RW
    description: Content length, unit is byte. ECB mode, CBC mode, CFB128 mode length
      should align to 128bit (can't be zero). Get random data mode, length should
      align to 32bit (can't be zero). CFB8 mode, OFB mode, CTR mode length can be
      any value (can't be zero). CMAC mode length can be any value (can be zero).
- name: CMD_VALID
  address: '0x14'
  default: '0x0000_0000'
  fields:
  - bit_range: '0'
    name: cmd_valid
    access: RO
    description: '1''b1: a new command is ready, this bit should be written after
      all of the command configuration has been done, this bit will be cleared when
      the command is being executing automatically'
- name: SYS_CTRL
  address: '0x18'
  default: '0x0000_0000'
  fields:
  - bit_range: '1'
    name: irq_en
    access: RW
    description: '1''b1: enable interrupt'
  - bit_range: '0'
    name: dma_en
    access: RW
    description: '1''b1: enable dma'
- name: SYS_STATUS
  address: '0x1C'
  default: '0x0000_00A6'
  fields:
  - bit_range: '8'
    name: tx_fifo_empty
    access: RO
    description: '1''b1: TX fifo empty, CPU can read cipher result when TX fifo not
      empty'
  - bit_range: '7'
    name: tx_fifo_full
    access: RO
    description: '1''b1: TX fifo full'
  - bit_range: '6'
    name: rx_fifo_empty
    access: RO
    description: '1''b1: RX fifo empty'
  - bit_range: '5'
    name: rx_fifo_full
    access: RO
    description: '1''b1: RX fifo full, CPU can write data into HSM RX fifo when RX
      fifo not full'
  - bit_range: '4'
    name: cpu_cmd_on_going
    access: RO
    description: '1''b1: there is a CPU command being executed'
  - bit_range: '3'
    name: cmd_rg_unlock
    access: RO
    description: '1''b1: command register in un-lock state, can write new command
      into HSM'
  - bit_range: '2'
    name: hsm_idle
    access: RO
    description: '1''b1: HSM in idle state'
  - bit_range: '1:0'
    name: hsm_cmd_done
    access: R1C
    description: '2''b11: command done without error

      2''b01: command done with value

      This bit will be cleared after read or a new command start'
- name: VFY_STATUS
  address: '0x20'
  default: '0x0000_0000'
  fields:
  - bit_range: '1'
    name: bl_vfy_pass
    access: RO
    description: '1''b1: bootloader verify pass'
  - bit_range: '0'
    name: bl_vfy_done
    access: RO
    description: '1''b1: bootloader verify done (key_index = 1 means verify bootloader
      )'
- name: VFY_STATUS_CLR
  address: '0x24'
  default: '0x0000_0000'
  fields:
  - bit_range: '0'
    name: bl_vfy_clr
    access: WO
    description: clear bootloader verify done flag and passs flag
- name: AUTH_CTRL
  address: '0x28'
  default: '0x0000_0000'
  fields:
  - bit_range: '0'
    name: ext_auth_resp_valid
    access: RO
    description: when external authentication response has been written into HSM,
      CPU/DEBUGGER should write this bit to indicate the response is valid. This bit
      will be cleared when response is latched by HSM or a new command start
- name: AUTH_STATUS
  address: '0x2C'
  default: '0x0000_0000'
  fields:
  - bit_range: '16'
    name: auth_challenge_valid
    access: RO
    description: '1''b1: authentication challenge is valid, CPU can read challenge
      after this bit is been asserted'
  - bit_range: '11'
    name: debug_unlock_auth_pass
    access: RO
    description: '1''b1: debug port will be open if the debug port unlock mode is
      authentication mode'
  - bit_range: '10'
    name: debug_unlock_auth_tmo_fail
    access: RO
    description: '1''b1: debug unlock authentication failed because of timeout'
  - bit_range: '9'
    name: debug_unlock_auth_done
    access: RO
    description: '1''b1: the debug unlock authentication is done'
  - bit_range: '8'
    name: swap_flag_unlock_auth_pass
    access: RO
    description: '1''b1: the programming/erase of swap flag area is open'
  - bit_range: '7'
    name: asym_key_up_unlock_auth_pass
    access: RO
    description: '1''b1: the programming/erase of asymmetric area is open'
  - bit_range: '6'
    name: sym_key_up_unlock_auth_pass
    access: RO
    description: '1''b1: the programming/erase of symmetric area is open'
  - bit_range: '5'
    name: sym_key_rd_unlock_auth_pass
    access: RO
    description: '1''b1: the read permission of symmetric key area is open'
  - bit_range: '4'
    name: s_fw_unlock_auth_pass
    access: RO
    description: '1''b1: the programming/erase permission of security FW area is open'
  - bit_range: '3'
    name: bl_unlock_auth_pass
    access: RO
    description: '1''b1: the programming/erase permission of bootloader area is open'
  - bit_range: '2'
    name: chip_status_unlock_auth_pass
    access: RO
    description: '1''b1: the programming permission of chip status area is open'
  - bit_range: '1'
    name: int_auth_tmo_fail
    access: RO
    description: '1''b1: internal authentication failed because of timeout'
  - bit_range: '0'
    name: int_auth_done
    access: RO
    description: '1''b1: internal authentication (all of the authentication except
      debug unlock authentication) is done'
- name: AUTH_STATUS_CLR
  address: '0x30'
  default: '0x0000_0000'
  fields:
  - bit_range: '8'
    name: swap_flag_unlock_auth_pass_clr
    access: RO
    description: '1''b1: close the programming/erase of swap flag area'
  - bit_range: '7'
    name: asym_key_up_unlock_auth_pass_clr
    access: RO
    description: '1''b1: close the programming/erase of asymmetric area'
  - bit_range: '6'
    name: sym_key_up_unlock_auth_pass_clr
    access: RO
    description: '1''b1: close the programming/erase of symmetric area'
  - bit_range: '5'
    name: sym_key_rd_unlock_auth_pass_clr
    access: RO
    description: '1''b1: close the read permission of symmetric key area'
  - bit_range: '4'
    name: s_fw_unlock_auth_pass_clr
    access: RO
    description: '1''b1: close the programming/erase permission of security FW area'
  - bit_range: '3'
    name: bl_unlock_auth_pass_clr
    access: RO
    description: '1''b1: close the programming/erase permission of bootloader area'
  - bit_range: '2'
    name: chip_status_unlock_auth_pass_clr
    access: RO
    description: '1''b1: close the programming permission of chip status area'
  - bit_range: '1'
    name: int_auth_tmo_fail_clr
    access: RO
    description: '1''b1: clear internal authentication timeout failed flag'
  - bit_range: '0'
    name: int_auth_done_clr
    access: RO
    description: '1''b1: clear internal authentication (all of the authentication
      except debug unlock authentication) done flag'
- name: CIPHER_IN
  address: '0x034'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: Cipher_in
    access: WO
    description: After command write into HSM, if rx fifo not full, cpu or DMA can
      write source data into this register, then HSM will start encryption/decryption
      or MAC calculation automatically
- name: CIPHER_OUT
  address: '0x038'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: Cipher_out
    access: RO
    description: If tx fifo not empty, cpu or DMA can read this register to get HSM
      result
- name: IV0
  address: '0x03C'
  default: '0x0000_0000'
  fields: []
- name: IV1
  address: '0x040'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: IV1
    access: RW
    description: IV[95:64], if cipher mode is CBC/CFB8/CFB128/OFB, SW should write
      IV into this register before trig cmd_valid, if cipher mode is CTR, SW should
      write initial counter value into this register before trig cmd_valid
- name: IV2
  address: '0x044'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: IV2
    access: RW
    description: IV[63:32], if cipher mode is CBC/CFB8/CFB128/OFB, SW should write
      IV into this register before trig cmd_valid, if cipher mode is CTR, SW should
      write initial counter value into this register before trig cmd_valid
- name: IV3
  address: '0x048'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: IV3
    access: RW
    description: IV[31:0], if cipher mode is CBC/CFB8/CFB128/OFB, SW should write
      IV into this register before trig cmd_valid, if cipher mode is CTR, SW should
      write initial counter value into this register before trig cmd_valid
- name: RAM_KEY0
