      the code store in NVM, the command will only be executed when the comparison
      is successful. if aes256_en (CMD register bit20) = 0, then KEK_AUTH_CODE4 is
      not used.
- name: KEK_AUTH_CODE5
  address: '0x0B0'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: KEK_AUTH_CODE5
    access: RW
    description: KEK_AUTH_CODE[95:64], if key_index = 10, SW should write KEK authorization
