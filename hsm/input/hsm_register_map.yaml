- name: IRQ_STATUS
  address: '0x0BC'
  default: '0x0000_0000'
  fields:
  - bit_range: '18'
    name: irq_status[18]
    access: RO
    description: data length is zero when get random number
  - bit_range: '17'
    name: irq_status[17]
    access: RO
    description: data length not align to 32 when get random number
  - bit_range: '16'
    name: irq_status[16]
    access: RO
    description: not select authentication key (<2 or >9) when cipher mode is authentication
  - bit_range: '15'
    name: irq_status[15]
    access: RO
    description: select key has been disabled (key 4/5 can be disabled with OTP configuration)
      when cipher mode is authentication
  - bit_range: '14'
    name: irq_status[14]
    access: RO
    description: key index invalid (>22 or =11) when cipher mode is cmac
  - bit_range: '13'
    name: irq_status[13]
    access: RO
    description: select authentication key (key 2-9) when cipher mode is cmac
  - bit_range: '12'
    name: irq_status[12]
    access: RO
    description: select key 10 when cipher mode is cmac
  - bit_range: '11'
    name: irq_status[11]
    access: RO
    description: key index invalid (>22 or =11) when cipher mode is cfb8/ofb/ctr
  - bit_range: '10'
    name: irq_status[10]
    access: RO
    description: select authentication key (key 2-9) when cipher mode is cfb8/ofb/ctr
  - bit_range: '9'
    name: irq_status[9]
    access: RO
    description: select key 1 when cipher mode is cfb8/ofb/ctr
  - bit_range: '8'
    name: irq_status[8]
    access: RO
    description: data length is zero when cipher mode is cfb8/ofb/ctr
  - bit_range: '7'
    name: irq_status[7]
    access: RO
    description: key index invalid (>22 or =11) when cipher mode is ecb/cbc/cfb128
  - bit_range: '6'
    name: irq_status[6]
    access: RO
    description: select authentication key (key 2-9) when cipher mode is ecb/cbc/cfb128
  - bit_range: '5'
    name: irq_status[5]
    access: RO
    description: select key 1 when cipher mode is ecb/cbc/cfb128
  - bit_range: '4'
    name: irq_status[4]
    access: RO
    description: data length is zero when cipher mode is ecb/cbc/cfb128
  - bit_range: '3'
    name: irq_status[3]
    access: RO
    description: data length not align to 128bit when cipher mode is ecb/cbc/cfb128
  - bit_range: '2'
    name: irq_status[2]
    access: RO
    description: select flash key, but key invalid
  - bit_range: '1'
    name: irq_status[1]
    access: RO
    description: select KEK, but KEK authorization code invalid
  - bit_range: '0'
    name: irq_status[0]
    access: RO
