- name: KEK_AUTH_CODE0
  address: '0x09C'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: KEK_AUTH_CODE0
    access: RW
    description: KEK_AUTH_CODE[255:224], if key_index = 10, SW should write KEK authorization
      code into this register before trig cmd valid, HSM will compare this code with
      the code store in NVM, the command will only be executed when the comparison
      is successful
- name: KEK_AUTH_CODE1
  address: '0x0A0'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: KEK_AUTH_CODE1
    access: RW
    description: KEK_AUTH_CODE[223:192], if key_index = 10, SW should write KEK authorization
      code into this register before trig cmd valid, HSM will compare this code with
      the code store in NVM, the command will only be executed when the comparison
      is successful
- name: KEK_AUTH_CODE2
  address: '0x0A4'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: KEK_AUTH_CODE3
    access: RW
    description: KEK_AUTH_CODE[191:160], if key_index = 10, SW should write KEK authorization
      code into this register before trig cmd valid, HSM will compare this code with
