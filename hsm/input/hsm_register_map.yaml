- name: RAM_KEY3
  address: '0x058'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: RAM_KEY3
    access: RW
    description: RAM_KEY[159:128], if key index is 22, the SW should write ram key
