- name: RAM_KEY6
  address: '0x064'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: RAM_KEY6
    access: RW
    description: RAM_KEY[63:32], if key index is 22, the SW should write ram key into
      this register before trig cmd_valid, if aes256_en (CMD register bit20) = 0,
