  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: golden_mac0
    access: RW
    description: Golden MAC[127:96], if cipher mode is cmac_mode and key index is
      1, then HSM will veify MAC automatically, SW should write golden MAC into this
      register before trig cmd_valid
- name: GOLDEN_MAC1
  address: '0x090'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: golden_mac1
    access: RW
    description: Golden MAC[95:64], if cipher mode is cmac_mode and key index is 1,
      then HSM will veify MAC automatically, SW should write golden MAC into this
      register before trig cmd valid
- name: GOLDEN_MAC2
  address: '0x094'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: golden_mac2
    access: RW
    description: Golden MAC[63:32], if cipher mode is cmac_mode and key index is 1,
      then HSM will veify MAC automatically, SW should write golden MAC into this
