- name: RAM_KEY7
  address: '0x068'
  default: '0x0000_0000'
  fields:
  - bit_range: '31:0'
    name: RAM_KEY7
    access: RW
    description: RAM_KEY[31:0], if key index is 22, the SW should write ram key into
      this register before trig cmd_valid, if aes256_en (CMD register bit20) = 0,
